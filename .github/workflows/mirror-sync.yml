name: Mirror sync

# ADR-036 Job A: one-way snapshot sync of the scrubbed core to the tenant
# mirror repo. Job B (pack -> app-repo PRs, ADR-034 §5) is deferred — this
# workflow is trigger-only; all logic lives in scripts/mirror-sync.sh.
#
# Auth: a GitHub App install token, minted fresh per run (ADR-036 explicitly
# rejects hand-minted PATs as the long-term mechanism). Provision the lade
# GitHub App (repo-scoped to the mirror, Contents:write) before enabling
# this workflow — the mirror stays disabled until it exists. Once it does,
# set LADE_MIRROR_APP_ID (repo variable) and LADE_MIRROR_APP_PRIVATE_KEY
# (repo secret) to the App's id/private key.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Stays inert until the lade GitHub App is provisioned. Without this guard
    # the create-github-app-token step errors ("Input required: app-id") and
    # red-Xs every push to main.
    if: ${{ vars.LADE_MIRROR_APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Mint GitHub App install token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LADE_MIRROR_APP_ID }}
          private-key: ${{ secrets.LADE_MIRROR_APP_PRIVATE_KEY }}
          # The App is installed on the tenant mirror repo, not on this source
          # repo — without owner/repositories the action looks for the install
          # here and 404s. Scope the minted token to the mirror.
          owner: ${{ vars.LADE_MIRROR_OWNER }}
          repositories: ${{ vars.LADE_MIRROR_REPO }}

      - name: Sync mirror
        env:
          LADE_MIRROR_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./scripts/mirror-sync.sh --dest ${{ vars.LADE_MIRROR_DEST }}
