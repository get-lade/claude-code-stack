name: run-tests

# Node/pnpm test gate for /auto-merge. Job name `run-tests` IS the required
# check context. Adjust node-version / install / test command to the repo
# (the /auto-merge skill substitutes these during scaffolding).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  run-tests:
    name: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
