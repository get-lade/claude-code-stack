name: run-tests

# Python/pytest test gate for /auto-merge. Job name `run-tests` IS the required
# check context. Adjust python-version / install / test command to the repo
# (the /auto-merge skill substitutes these during scaffolding).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  run-tests:
    name: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest
