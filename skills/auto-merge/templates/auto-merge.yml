name: auto-merge

# Enables GitHub auto-merge (squash) on every PR. The PR merges itself once the
# required `run-tests` status check passes. Installed by the /auto-merge skill.
# Requires repo setting allow_auto_merge=true and a ruleset requiring run-tests.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
